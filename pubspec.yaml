name: spend_tracker
description: Cash flow tracker — auto-capture spending from notifications, SMS, and Gmail.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  intl: ^0.20.2
  fl_chart: ^1.0.0
  google_fonts: ^6.2.1
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1
  crypto: ^3.0.6
  google_sign_in: ^6.2.2
  googleapis: ^13.2.0
  extension_google_sign_in_as_googleapis_auth: ^2.0.12
  flutter_secure_storage: ^9.2.4
  share_plus: ^10.1.4
  permission_handler: ^11.4.0
  shared_preferences: ^2.5.3
  flutter_local_notifications: ^22.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.22.1
  build_runner: ^2.4.14

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
