name: spend_tracker
description: Cash flow tracker — auto-capture spending from notifications and SMS.
publish_to: 'none'
version: 0.1.2+4

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  intl: ^0.20.2
  fl_chart: ^1.0.0
  google_fonts: ^6.2.1
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1
  crypto: ^3.0.6
  share_plus: ^10.1.4
  file_picker: ^8.1.7
  permission_handler: ^11.4.0
  shared_preferences: ^2.5.3
  flutter_local_notifications: ^22.0.1
  url_launcher: ^6.3.2
  package_info_plus: ^8.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.22.1
  build_runner: ^2.4.14
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/launcher_icon.png
  adaptive_icon_background: "#120808"
  adaptive_icon_foreground: assets/images/launcher_foreground.png
  adaptive_icon_foreground_inset: 0
  min_sdk_android: 21
  remove_alpha_ios: true
  background_color_ios: "#120808"

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
